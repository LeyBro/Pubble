{% extends "base.html" %}

{% block title %}Новый пароль{% endblock %}

{% block content %}
<div class="page-top">
    <h1>Новый пароль</h1>
</div>

<form class="form" method="POST">
    <input type="password" name="password" placeholder="Новый пароль" required>
    <input type="password" name="password2" placeholder="Повтори пароль" required>
    <button type="submit">Сохранить новый пароль</button>
</form>
{% endblock %}
