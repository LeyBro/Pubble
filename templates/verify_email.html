{% extends "base.html" %}

{% block title %}Подтверждение email{% endblock %}

{% block content %}
<div class="page-top">
    <h1>Подтверждение email</h1>
</div>

<form class="form" method="POST">
    <p>Мы отправили код подтверждения на:</p>
    <p><strong>{{ email }}</strong></p>

    <input type="text" name="code" placeholder="Введи 6-значный код" maxlength="6" required>
    <button type="submit">Подтвердить email</button>
</form>

<form method="POST" action="/resend-verification/{{ email }}" style="margin-top: 12px;">
    <button type="submit" class="main-button">Отправить новый код</button>
</form>
{% endblock %}
