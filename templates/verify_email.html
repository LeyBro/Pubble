{% extends "base.html" %}

{% block title %}Подтверждение email{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h1>Подтверждение email</h1>

        <p class="auth-subtitle">
            Мы отправили код подтверждения на:
        </p>

        <p class="auth-email"><strong>{{ email }}</strong></p>

        <form method="POST" class="form auth-form">
            <input
                type="text"
                name="code"
                placeholder="Введи 6-значный код"
                maxlength="6"
                required
            >

            <button type="submit" class="btn-primary">
                Подтвердить email
            </button>
        </form>

        <form method="POST" action="{{ url_for('resend_verification') }}" class="resend-form">
            <input type="hidden" name="email" value="{{ email }}">
            <button type="submit" class="btn-secondary">
                Отправить новый код
            </button>
        </form>
    </div>
</div>
{% endblock %}
