{% extends "base.html" %}

{% block title %}Проверка кода{% endblock %}

{% block content %}
<div class="page-top">
    <h1>Проверка кода</h1>
</div>

<form class="form" method="POST">
    <p>Мы отправили код на:</p>
    <p><strong>{{ email }}</strong></p>

    <input type="text" name="code" placeholder="Введи 6-значный код" maxlength="6" required>
    <button type="submit">Проверить код</button>
</form>

<form method="POST" action="/resend-reset-code/{{ email }}" style="margin-top: 12px;">
    <button type="submit" class="main-button">Отправить новый код</button>
</form>
{% endblock %}
